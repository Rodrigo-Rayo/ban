@if (visible()) {
  <div class="fixed bottom-16 md:bottom-0 left-0 right-0 z-50 p-4 lg:p-6 pointer-events-none">
    <div class="max-w-2xl mx-auto bg-dark-800 border border-dark-500 rounded-2xl shadow-2xl shadow-black/50
                p-5 flex flex-col sm:flex-row items-start sm:items-center gap-4 pointer-events-auto
                animate-slide-in">

      <!-- Cookie icon -->
      <div class="w-10 h-10 rounded-xl bg-primary-900/60 border border-primary-500/20 flex items-center justify-center flex-shrink-0">
        <svg aria-hidden="true" class="w-5 h-5 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75"
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
        </svg>
      </div>

      <div class="flex-1 min-w-0">
        <p class="text-sm font-semibold text-ink mb-1">Usamos cookies esenciales</p>
        <p class="text-xs text-ink-muted leading-relaxed">
          Solo usamos cookies necesarias para el funcionamiento de la sesión.
          Sin publicidad ni rastreo de terceros.
          <a routerLink="/legal/cookies" class="text-primary-500 hover:underline ml-1">Más información</a>
        </p>
      </div>

      <div class="flex items-center gap-2 flex-shrink-0 w-full sm:w-auto">
        <button (click)="reject()"
          class="flex-1 sm:flex-none text-xs font-medium text-ink-muted hover:text-ink border border-dark-600
                 hover:border-ink-muted/40 rounded-full px-4 py-2 transition-colors">
          Rechazar
        </button>
        <button (click)="accept()"
          class="flex-1 sm:flex-none btn-primary text-xs px-5 py-2">
          Aceptar
        </button>
      </div>

    </div>
  </div>
}
