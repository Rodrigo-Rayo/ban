<div class="min-h-screen bg-dark-900 flex flex-col items-center justify-center px-4 py-16">

  <a routerLink="/" class="text-xl font-bold text-ink mb-10">
    Band<span class="text-primary-400">You</span>
  </a>

  <div class="w-full max-w-sm">

    @if (success()) {
      <div class="text-center py-10 animate-slide-in">
        <div class="w-16 h-16 rounded-full bg-signal-gBg border border-signal-green/30 flex items-center justify-center mx-auto mb-6">
          <svg class="w-8 h-8 text-signal-green" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-ink mb-2">Contraseña actualizada.</h2>
        <p class="text-sm text-ink-muted max-w-xs mx-auto leading-relaxed">
          Redirigiendo a tu panel...
        </p>
      </div>
    } @else {
      <div class="mb-8">
        <h1 class="text-3xl font-bold text-ink mb-2">Nueva contraseña</h1>
        <p class="text-sm text-ink-muted">Elige una contraseña segura para tu cuenta.</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
        <div>
          <label class="block text-xs font-semibold text-ink-3 mb-2 uppercase tracking-wide">Nueva contraseña</label>
          <input formControlName="password" type="password" placeholder="Mínimo 6 caracteres"
            class="input-field" autocomplete="new-password"/>
        </div>
        <div>
          <label class="block text-xs font-semibold text-ink-3 mb-2 uppercase tracking-wide">Confirmar contraseña</label>
          <input formControlName="confirm" type="password" placeholder="Repite la contraseña"
            class="input-field" autocomplete="new-password"/>
        </div>

        @if (error()) {
          <div class="bg-signal-rBg border border-signal-red/30 text-signal-red px-4 py-3 rounded-lg text-xs font-medium">
            {{ error() }}
          </div>
        }

        <button type="submit" [disabled]="loading() || form.invalid"
          class="btn-accent py-3.5 w-full mt-1 text-sm disabled:opacity-40 disabled:cursor-not-allowed">
          @if (loading()) { Guardando... } @else { Guardar contraseña }
        </button>
      </form>
    }
  </div>
</div>
