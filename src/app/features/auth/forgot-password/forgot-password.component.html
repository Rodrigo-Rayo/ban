<div class="min-h-screen bg-dark-900 flex flex-col items-center justify-center px-4 py-16">

  <a routerLink="/" class="text-xl font-bold text-ink mb-10">
    Band<span class="text-primary-400">You</span>
  </a>

  <div class="w-full max-w-sm">

    @if (success()) {
      <div class="text-center py-10 animate-slide-in">
        <div class="w-16 h-16 rounded-full bg-signal-gBg border border-signal-green/30 flex items-center justify-center mx-auto mb-6">
          <svg class="w-8 h-8 text-signal-green" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-ink mb-2">Revisa tu email.</h2>
        <p class="text-sm text-ink-muted max-w-xs mx-auto leading-relaxed mb-6">
          Hemos enviado un enlace para restablecer tu contraseña.
        </p>
        <a routerLink="/auth/login" class="btn-accent text-sm px-6">Volver al inicio de sesión</a>
      </div>
    } @else {
      <div class="mb-8">
        <h1 class="text-3xl font-bold text-ink mb-2">Recuperar contraseña</h1>
        <p class="text-sm text-ink-muted">Introduce tu email y te enviaremos un enlace.</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
        <div>
          <label class="block text-xs font-semibold text-ink-3 mb-2 uppercase tracking-wide">Email</label>
          <input formControlName="email" type="email" placeholder="tu@email.com"
            class="input-field" autocomplete="email"/>
        </div>

        @if (error()) {
          <div class="bg-signal-rBg border border-signal-red/30 text-signal-red px-4 py-3 rounded-lg text-xs font-medium">
            {{ error() }}
          </div>
        }

        <button type="submit" [disabled]="loading() || form.invalid"
          class="btn-accent py-3.5 w-full mt-1 text-sm disabled:opacity-40 disabled:cursor-not-allowed">
          @if (loading()) { Enviando... } @else { Enviar enlace }
        </button>
      </form>

      <p class="text-center text-xs text-ink-muted mt-6">
        <a routerLink="/auth/login" class="text-primary-400 hover:text-primary-300 transition-colors font-medium">
          ← Volver al inicio de sesión
        </a>
      </p>
    }
  </div>
</div>
