<div class="min-h-screen bg-dark-900" style="padding-top:64px; padding-bottom:64px">

  <!-- Header -->
  <div class="px-6 lg:px-10 py-5 border-b border-dark-600 bg-dark-800/50 flex items-center gap-4">
    <a routerLink="/dashboard"
       class="p-1.5 text-ink-muted hover:text-ink hover:bg-dark-700 rounded-lg transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <div>
      <div class="section-label mb-0.5">Publicar</div>
      <h1 class="text-xl font-bold text-ink">Nuevo evento</h1>
    </div>
  </div>

  <div class="px-6 lg:px-10 py-8 max-w-2xl">

    @if (success()) {
      <div class="text-center py-16 animate-slide-in">
        <div class="w-16 h-16 rounded-full bg-signal-gBg border border-signal-green/30 flex items-center justify-center mx-auto mb-6">
          <svg class="w-8 h-8 text-signal-green" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <h2 class="text-3xl font-bold text-ink mb-2">¡Evento publicado!</h2>
        <p class="text-sm text-ink-muted mb-8">Tu evento ya está visible en BandYou.</p>
        <div class="flex gap-3 justify-center">
          <a routerLink="/search" [queryParams]="{tab:'events'}" class="btn-accent text-sm px-6">Ver todos los eventos</a>
          <a routerLink="/dashboard" class="btn-secondary text-sm px-6">Mi panel</a>
        </div>
      </div>
    } @else {
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">

        <!-- Event info -->
        <div class="card-flat overflow-hidden">
          <div class="px-5 py-3.5 border-b border-dark-600">
            <h2 class="text-xs font-bold text-ink-3 uppercase tracking-widest">Información del evento</h2>
          </div>
          <div class="p-5 flex flex-col gap-4">
            <div>
              <label class="block text-xs font-semibold text-ink-3 uppercase tracking-wide mb-2">Nombre del evento *</label>
              <input formControlName="title" type="text" placeholder="Ej: Noche de Jazz en Sala Clamores" class="input-field"/>
            </div>
            <div class="grid sm:grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-semibold text-ink-3 uppercase tracking-wide mb-2">Local / Sala *</label>
                <input formControlName="venue" type="text" placeholder="Nombre del local" class="input-field"/>
              </div>
              <div>
                <label class="block text-xs font-semibold text-ink-3 uppercase tracking-wide mb-2">Ciudad *</label>
                <input formControlName="city" type="text" placeholder="Madrid" class="input-field"/>
              </div>
            </div>
            <div class="grid sm:grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-semibold text-ink-3 uppercase tracking-wide mb-2">Fecha *</label>
                <input formControlName="date" type="date" class="input-field"/>
              </div>
              <div>
                <label class="block text-xs font-semibold text-ink-3 uppercase tracking-wide mb-2">Hora</label>
                <input formControlName="time" type="time" class="input-field"/>
              </div>
            </div>
            <div class="grid sm:grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-semibold text-ink-3 uppercase tracking-wide mb-2">Género *</label>
                <select formControlName="genre" class="input-field">
                  <option value="" disabled>Selecciona género</option>
                  @for (genre of genres; track genre) {
                    <option [value]="genre">{{ genre }}</option>
                  }
                </select>
              </div>
              <div>
                <label class="block text-xs font-semibold text-ink-3 uppercase tracking-wide mb-2">Precio</label>
                <input formControlName="price" type="text" placeholder="Gratis / 10€" class="input-field"/>
              </div>
            </div>
            <div>
              <label class="block text-xs font-semibold text-ink-3 uppercase tracking-wide mb-2">
                Descripción <span class="opacity-50 normal-case font-normal">(opcional)</span>
              </label>
              <textarea formControlName="description" rows="3" placeholder="Cuéntanos más sobre el evento..."
                class="input-field resize-none"></textarea>
            </div>
          </div>
        </div>

        <!-- Contact -->
        <div class="card-flat overflow-hidden">
          <div class="px-5 py-3.5 border-b border-dark-600">
            <h2 class="text-xs font-bold text-ink-3 uppercase tracking-widest">Contacto y entradas</h2>
          </div>
          <div class="p-5 flex flex-col gap-4">
            <div>
              <label class="block text-xs font-semibold text-ink-3 uppercase tracking-wide mb-2">
                Email de contacto <span class="opacity-50 normal-case font-normal">(opcional)</span>
              </label>
              <input formControlName="contactEmail" type="email" placeholder="booking@tulocal.com" class="input-field"/>
            </div>
            <div>
              <label class="block text-xs font-semibold text-ink-3 uppercase tracking-wide mb-2">
                Link de entradas <span class="opacity-50 normal-case font-normal">(opcional)</span>
              </label>
              <input formControlName="ticketUrl" type="url" placeholder="https://..." class="input-field"/>
            </div>
          </div>
        </div>

        <button type="submit" [disabled]="loading() || form.invalid"
          class="btn-accent py-4 w-full text-sm disabled:opacity-40 disabled:cursor-not-allowed">
          @if (loading()) { Publicando... } @else { Publicar evento }
        </button>
      </form>
    }
  </div>
</div>
