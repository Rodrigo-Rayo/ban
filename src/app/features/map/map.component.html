<div class="min-h-screen bg-dark-900 flex flex-col" style="padding-top:64px">

  <!-- Top bar -->
  <div class="bg-dark-800 border-b border-dark-600 px-4 py-3 flex flex-wrap items-center gap-2 flex-shrink-0">

    <!-- Ciudad -->
    <select [ngModel]="selectedCity()" (ngModelChange)="onCityChange($event)"
      class="bg-dark-700 border border-dark-600 rounded-full px-3 py-1.5 text-xs text-ink outline-none focus:border-primary-500 transition-colors font-medium">
      @for (c of cities; track c) { <option [value]="c">{{ c }}</option> }
    </select>

    <!-- Layer toggles -->
    <div class="flex flex-wrap gap-1.5">
      @for (layer of layers; track layer) {
        <button (click)="toggleLayer(layer)"
          class="flex items-center gap-1.5 text-xs font-semibold px-3 py-1.5 rounded-full border transition-all duration-200"
          [style.borderColor]="activeLayers().has(layer) ? layerColors[layer] : ''"
          [style.color]="activeLayers().has(layer) ? layerColors[layer] : ''"
          [class.border-dark-600]="!activeLayers().has(layer)"
          [class.text-ink-muted]="!activeLayers().has(layer)">
          <span class="w-2 h-2 rounded-full flex-shrink-0"
            [style.background]="activeLayers().has(layer) ? layerColors[layer] : '#9c9088'"></span>
          {{ layerLabels[layer] }}
        </button>
      }
    </div>

    <!-- Count -->
    @if (!loading()) {
      <span class="text-xs text-ink-muted ml-auto font-medium">{{ totalVisible() }} en el mapa</span>
    }
  </div>

  <!-- Map container -->
  <div class="relative" [style.height]="mapHeight">

    @if (loading()) {
      <div class="absolute inset-0 flex items-center justify-center bg-dark-800 z-10">
        <div class="flex flex-col items-center gap-3">
          <div class="w-8 h-8 border-2 border-primary-500 border-t-transparent rounded-full animate-spin"></div>
          <p class="text-xs text-ink-muted">Cargando mapa…</p>
        </div>
      </div>
    }

    <div #mapContainer [style.height]="mapHeight" style="width:100%"></div>
  </div>

</div>
