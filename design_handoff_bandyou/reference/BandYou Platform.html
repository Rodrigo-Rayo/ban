<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>BandYou — Plataforma</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f5f1ea; }
  body { font-family: 'Inter', system-ui, sans-serif; color: #141210; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  button { font-family: inherit; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="tokens.js"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens/landing.jsx"></script>
<script type="text/babel" src="screens/onboarding.jsx"></script>
<script type="text/babel" src="screens/home.jsx"></script>
<script type="text/babel" src="screens/core.jsx"></script>
<script type="text/babel" src="screens/extras.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#d9532b",
  "paper": "#f5f1ea",
  "density": "comfy"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // Live apply accent/paper via CSS custom props + mutate tokens
  React.useEffect(() => {
    window.BY_TOKENS.accent = tweaks.accent;
    window.BY_TOKENS.paper = tweaks.paper;
  }, [tweaks.accent, tweaks.paper]);

  const update = (patch) => {
    const next = { ...tweaks, ...patch };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
  };

  return (
    <>
      <DesignCanvas key={`${tweaks.accent}|${tweaks.paper}`}>
        <DCSection id="flow" title="BandYou · Flujo completo" subtitle="Navega por las pantallas clave del producto. Click en cualquier artboard para expandir.">
          <DCArtboard id="landing" label="01 · Landing" width={1280} height={2600}>
            <Landing />
          </DCArtboard>
          <DCArtboard id="onboarding" label="02 · Onboarding" width={1100} height={720}>
            <Onboarding />
          </DCArtboard>
          <DCArtboard id="home" label="03 · Home / Feed" width={1440} height={960}>
            <Home />
          </DCArtboard>
          <DCArtboard id="search" label="04 · Búsqueda" width={1440} height={900}>
            <Search />
          </DCArtboard>
          <DCArtboard id="profile" label="05 · Perfil músico" width={1280} height={1500}>
            <MusicianProfile />
          </DCArtboard>
          <DCArtboard id="chat" label="06 · Chat" width={1440} height={860}>
            <Chat />
          </DCArtboard>
          <DCArtboard id="map" label="07 · Mapa escena" width={1280} height={820}>
            <MapScene />
          </DCArtboard>
          <DCArtboard id="events" label="08 · Eventos / jams" width={1280} height={1080}>
            <Events />
          </DCArtboard>
          <DCArtboard id="rehearsal" label="09 · Local de ensayo" width={1280} height={1280}>
            <Rehearsal />
          </DCArtboard>
        </DCSection>

        <DCPostIt top={40} left={40} rotate={-3}>
          <b>BandYou v1 ·</b> 9 pantallas, sistema completo. Editorial + mono, acento ámbar eléctrico. Click en cualquier artboard para ver a tamaño real.
        </DCPostIt>

        <DCPostIt top={60} right={40} rotate={2} width={200}>
          <b>Tweaks →</b> cambia el acento, el fondo o la densidad desde el panel flotante (abajo-derecha).
        </DCPostIt>
      </DesignCanvas>

      {tweaksOpen && (
        <div style={{
          position: 'fixed', bottom: 20, right: 20, width: 280,
          background: '#fbf8f2', border: '1px solid #141210',
          fontFamily: "'Inter', sans-serif", color: '#141210',
          boxShadow: '0 12px 40px rgba(0,0,0,0.2)', zIndex: 200,
        }}>
          <div style={{ padding: '12px 16px', borderBottom: '1px solid #e5ddce', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: 2, textTransform: 'uppercase' }}>Tweaks</span>
            <button onClick={() => setTweaksOpen(false)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, lineHeight: 1 }}>×</button>
          </div>
          <div style={{ padding: 16 }}>
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 11, fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1, color: '#7a6f62', marginBottom: 8 }}>ACENTO</div>
              <div style={{ display: 'flex', gap: 6 }}>
                {[
                  { v: '#d9532b', n: 'ámbar' },
                  { v: '#c74418', n: 'rojo' },
                  { v: '#4a6b3f', n: 'verde' },
                  { v: '#3d4f6b', n: 'azul' },
                  { v: '#6b3d5c', n: 'ciruela' },
                ].map(c => (
                  <button key={c.v} onClick={() => update({ accent: c.v })} title={c.n} style={{
                    width: 36, height: 36, background: c.v, cursor: 'pointer',
                    border: tweaks.accent === c.v ? '2px solid #141210' : '1px solid #e5ddce',
                  }}/>
                ))}
              </div>
            </div>
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 11, fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1, color: '#7a6f62', marginBottom: 8 }}>FONDO</div>
              <div style={{ display: 'flex', gap: 6 }}>
                {[
                  { v: '#f5f1ea', n: 'crema' },
                  { v: '#fbf8f2', n: 'marfil' },
                  { v: '#eae4d5', n: 'arena' },
                  { v: '#e8e2d4', n: 'piedra' },
                ].map(c => (
                  <button key={c.v} onClick={() => update({ paper: c.v })} title={c.n} style={{
                    width: 36, height: 36, background: c.v, cursor: 'pointer',
                    border: tweaks.paper === c.v ? '2px solid #141210' : '1px solid #e5ddce',
                  }}/>
                ))}
              </div>
            </div>
            <div style={{ fontSize: 11, color: '#7a6f62', lineHeight: 1.4, paddingTop: 12, borderTop: '1px solid #e5ddce' }}>
              Cambia el acento en vivo — aplica a todas las pantallas. Haz click en un artboard para verlo a tamaño real.
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
